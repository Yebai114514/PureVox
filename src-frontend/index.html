<!doctype html>
<html lang="zh-CN" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PureVox</title>
    <!--
      预置默认主题 CSS 变量，确保 WebView 首次 paint 前 glass 和背景光晕就已经染色。
      这是为了避免 JS 加载/执行延迟导致首屏出现"无色玻璃"的闪烁。
      JS 加载完成后会通过 applyTheme() 用用户自定义主题覆盖这些默认值。
    -->
    <style>
      :root {
        --accent-primary-rgb: 124, 92, 255;
        --accent-secondary-rgb: 92, 245, 255;
        --bg-base: #0a0a0f;
        --bg-gradient-1: radial-gradient(at 20% 20%, rgba(var(--accent-primary-rgb), 0.18), transparent 50%);
        --bg-gradient-2: radial-gradient(at 80% 80%, rgba(var(--accent-secondary-rgb), 0.12), transparent 55%);
        --bg-gradient-3: radial-gradient(at 50% 0%, rgba(var(--accent-primary-rgb), 0.08), transparent 60%);
        --glass-l1-bg: rgba(255, 255, 255, 0.06);
        --glass-l1-border: rgba(255, 255, 255, 0.12);
        --glass-l1-blur: 24px;
        --glass-l1-saturation: 180%;
        --glass-l2-bg: rgba(20, 20, 30, 0.55);
        --glass-l2-border: rgba(255, 255, 255, 0.1);
        --glass-l2-blur: 40px;
        --glass-l3-bg: rgba(15, 15, 22, 0.75);
        --glass-l3-border: rgba(255, 255, 255, 0.15);
        --glass-l3-blur: 60px;
        --glass-hover-bg: rgba(255, 255, 255, 0.1);
        --glass-active-bg: rgba(124, 92, 255, 0.15);
      }
      html, body, #app { height: 100%; }
      body {
        margin: 0;
        background:
          var(--bg-gradient-1),
          var(--bg-gradient-2),
          var(--bg-gradient-3),
          var(--bg-base);
        color: rgba(255, 255, 255, 0.95);
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
